<!DOCTYPE html>
<html>
<head>
  <title>COGGS Admin</title>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>Admin Login</h2>
    <input id="tokenInput" type="password" placeholder="Password" />
    <button onclick="login()">Enter</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">
    <h2>COGGS Admin Tools</h2>

  <div>
    <select id="eventSelect" onchange="loadTable()">
      <option value="">Select event...</option>
    </select>

    <button onclick="download()">Download CSV</button>
    <button onclick="loadTable()">Load Attendees</button>
  </div>

    <br>

    <br><br>

    <button id="importBtn" onclick="runImport()">Run Import Entries</button>

    <pre id="importOutput" style="background:#eee; padding:10px;"></pre>

    <table border="1" id="table"></table>
  </div>

<script>
  const TOKEN_KEY = 'admin_token'

async function runImport() {
  const button = document.getElementById('importBtn')
  const output = document.getElementById('importOutput')

  // ✅ disable + change text immediately
  button.disabled = true
  button.innerText = 'Running...'

  output.textContent = 'Running import...\n'

  try {
    const res = await fetch('/api/import', {
      method: 'POST',
      headers: {
        'x-admin-token': getToken()
      }
    })

    const data = await res.json()

    if (!res.ok) {
      output.textContent += 'Error: ' + data.error
      return
    }

    data.logs.forEach(line => {
      output.textContent += line + '\n'
    })

    output.textContent += '\n✅ Done'

  } catch (err) {
    output.textContent += '\nError: ' + err.message

  } finally {
    // ✅ restore button state at the end
    button.disabled = false
    button.innerText = 'Run Import Entries'

      await loadTable()
  }
}

  async function loadEvents() {
  const res = await fetch('/api/events', {
    headers: {
      'x-admin-token': getToken()
    }
  })

  if (!res.ok) {
    alert('Failed to load events')
    return
  }

  const events = await res.json()

  const select = document.getElementById('eventSelect')
  select.innerHTML = '<option value="">Select event...</option>'

  events.forEach(e => {
    const option = document.createElement('option')
    option.value = e.id
    option.textContent = e.name || e.id
    select.appendChild(option)
  })
}

  function login() {
    const token = document.getElementById('tokenInput').value

    if (!token) {
      alert('Enter password')
      return
    }

    localStorage.setItem(TOKEN_KEY, token)
    showApp()
  }

  function getToken() {
    return localStorage.getItem(TOKEN_KEY)
  }

function showApp() {
  document.getElementById('login').style.display = 'none'
  document.getElementById('app').style.display = 'block'

  loadEvents()
}

  // auto-login if token exists
  if (getToken()) {
    showApp()
  }

  // ---- CSV DOWNLOAD ----
  async function download() {
    const eventId = document.getElementById('eventSelect').value

    const res = await fetch(`/api/export?eventId=${eventId}`, {
      headers: {
        'x-admin-token': getToken()
      }
    })

    if (!res.ok) {
      alert('Unauthorized or error')
      return
    }

    const blob = await res.blob()
    const url = window.URL.createObjectURL(blob)

    const a = document.createElement('a')
    a.href = url
    a.download = `event_${eventId}.csv`
    a.click()
  }

  // ---- LOAD TABLE ----
  async function loadTable() {
    const eventId = document.getElementById('eventSelect').value

    if (!eventId) {
      alert('Select an Event First')
      return
    }

    const res = await fetch(`/api/attendees?eventId=${eventId}`, {
      headers: {
        'x-admin-token': getToken()
      }
    })

    if (!res.ok) {
      alert('Unauthorized or error')
      return
    }

    const data = await res.json()

    renderTable(data)
  }

  function renderTable(rows) {
    const table = document.getElementById('table')
    table.innerHTML = ''

    if (!rows.length) return

    // headers
    const headerRow = document.createElement('tr')
    Object.keys(rows[0]).forEach(key => {
      const th = document.createElement('th')
      th.innerText = key
      headerRow.appendChild(th)
    })
    table.appendChild(headerRow)

    // rows
    rows.forEach(r => {
      const tr = document.createElement('tr')
      Object.values(r).forEach(val => {
        const td = document.createElement('td')
        td.innerText = val ?? ''
        tr.appendChild(td)
      })
      table.appendChild(tr)
    })
  }
</script>

</body>
</html>
