<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Leaderboard</h2>

<p><a href="person.html">Person results →</a></p>

<div class="filters">
    <label>Event:</label>
    <select id="eventSelect"></select>
  
    <label>Course:</label>
    <select id="courseFilter">
      <option value="">All</option>
    </select>
  
    <label>Class:</label>
    <select id="classFilter">
      <option value="">All</option>
    </select>
  </div>

<button id="toggleStages">Hide Stages</button>
<button id="toggleSectors">Hide Sectors</button>

<div class="table-wrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>Pos</th>
          <th>Name</th>
          <th>Course</th>
          <th>Class</th>
          <th>Total Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script src="config.js"></script>
<script type="module" src="leaderboard.js"></script>

</body>
</html>
