<!DOCTYPE html>
<html>
<head>
  <title>Person Results</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>Person Results</h2>
<div id="percentileChartWrap" style="display:none; max-width: 800px; margin: 16px 0;">
    <h3 style="margin-bottom: 4px;">Finish percentile over time</h3>
    <canvas id="percentileChart" height="120"></canvas>
    <p style="font-size: 0.85em; color: #666; margin-top: 4px;">
      Higher is better. 100% = won the class. DNF events are not plotted.
    </p>
  </div>
  <div class="filters">
    <label>Search:</label>
    <input
      id="personSearch"
      type="text"
      placeholder="Type a name or email..."
      style="width: 300px; padding: 5px;"
      autocomplete="off"
    />
  </div>

  <div id="searchResults" style="margin-bottom: 16px;"></div>

  <div id="personHeader"></div>

  <div class="table-wrap">
    <table id="resultsTable" style="display:none;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Event</th>
          <th>Course</th>
          <th>Class</th>
          <th>Total Time</th>
          <th>Place</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <p style="margin-top: 20px;">
    <a href="leaderboard.html">← Back to leaderboard</a>
  </p>
  https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js
  <script src="config.js"></script>
  <script src="person.js"></script>
</body>
</html>
