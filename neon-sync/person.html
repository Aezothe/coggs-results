<!DOCTYPE html>
<html>
<head>
  <title>Person Results</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>Person Results</h2>

  <div class="filters">
    <label>Search:</label>
    <input
      id="personSearch"
      type="text"
      placeholder="Type a name or email..."
      style="width: 300px; padding: 5px;"
      autocomplete="off"
    />
  </div>

  <div id="searchResults" style="margin-bottom: 16px;"></div>

  <div id="personHeader"></div>

  <div class="table-wrap">
    <table id="resultsTable" style="display:none;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Event</th>
          <th>Course</th>
          <th>Class</th>
          <th>Total Time</th>
          <th>Place</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <p style="margin-top: 20px;">
    <a href="leaderboard.html">← Back to leaderboard</a>
  </p>

  <script src="config.js"></script>
  <script src="person.js"></script>
</body>
</html>
