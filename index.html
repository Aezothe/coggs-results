<!DOCTYPE html>
<html>
  <body>
    <h2>SiTiming Export</h2>

    <input id="eventId" placeholder="Event ID (e.g. 17)" />
    <button onclick="download()">Download CSV</button>

    <script>
      function download() {
        const eventId = document.getElementById('eventId').value

        if (!eventId) {
          alert('Enter event ID')
          return
        }

        window.location.href = `/api/export?eventId=${eventId}`
      }
    </script>
  </body>
</html>
